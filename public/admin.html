<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Trading App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h1>Admin Panel</h1>
            <div id="user-info">
                <span>Welcome, <strong id="username-display"></strong>!</span>
                <a href="/index.html">Dashboard</a>
                <button id="logout-btn" class="btn">Logout</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>User Management</h2>
                <button id="create-user-btn" class="btn btn-primary" style="width: auto;">Create User</button>
            </div>
            <div id="users-list" style="margin-top: 2rem;">
                <!-- Users will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Create User Modal -->
    <div id="create-user-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New User</h2>
                <button id="close-modal-btn" class="close-button">&times;</button>
            </div>
            <form id="create-user-form">
                <div class="form-group">
                    <label for="new-username">Username</label>
                    <input type="text" id="new-username" required>
                </div>
                <div class="form-group">
                    <label for="new-password">Password</label>
                    <input type="password" id="new-password" required>
                </div>
                <div class="form-group">
                    <label for="new-role">Role</label>
                    <select id="new-role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            authService.requireAuth('admin');

            const user = authService.getUser();
            document.getElementById('username-display').textContent = user.username;

            document.getElementById('logout-btn').addEventListener('click', () => {
                authService.logout();
            });

            const usersList = document.getElementById('users-list');
            const createUserBtn = document.getElementById('create-user-btn');
            const modal = document.getElementById('create-user-modal');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const createUserForm = document.getElementById('create-user-form');

            // Modal logic
            createUserBtn.addEventListener('click', () => modal.style.display = 'flex');
            closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
            window.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });

            // Fetch and display users
            const fetchUsers = async () => {
                try {
                    const response = await fetch('/api/admin/users');
                    const data = await response.json();
                    if (data.success) {
                        usersList.innerHTML = ''; // Clear list
                        const table = document.createElement('table');
                        table.innerHTML = `
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Role</th>
                                    <th>Created At</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.users.map(u => `
                                    <tr>
                                        <td>${u.username}</td>
                                        <td>${u.role}</td>
                                        <td>${new Date(u.createdAt).toLocaleString()}</td>
                                        <td>
                                            ${u.id !== user.id ? `<button class="btn btn-danger btn-sm" data-id="${u.id}">Delete</button>` : 'Cannot delete self'}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        `;
                        usersList.appendChild(table);
                    }
                } catch (error) {
                    usersList.innerHTML = '<p>Error loading users.</p>';
                }
            };

            // Create a new user
            createUserForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('new-username').value;
                const password = document.getElementById('new-password').value;
                const role = document.getElementById('new-role').value;

                try {
                    await fetch('/api/admin/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, role })
                    });
                    createUserForm.reset();
                    modal.style.display = 'none';
                    fetchUsers(); // Refresh list
                } catch (error) {
                    alert('Failed to create user.');
                }
            });

            // Delete a user
            usersList.addEventListener('click', async (e) => {
                if (e.target.matches('button[data-id]')) {
                    const userId = e.target.dataset.id;
                    if (confirm('Are you sure you want to delete this user?')) {
                        try {
                            await fetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
                            fetchUsers(); // Refresh list
                        } catch (error) {
                            alert('Failed to delete user.');
                        }
                    }
                }
            });

            fetchUsers(); // Initial fetch
        });
    </script>
</body>
</html>
